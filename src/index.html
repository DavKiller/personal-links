<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" href="Logo.webp" type="image/webp">


    <title>DavKiller - Enlaces personales</title>
    <link rel="stylesheet" href="styles.css">

<body>
    <!-- Windows 7 Style Loader -->
    <div id="loader">
        <div class="loader-content">
            <div class="windows-logo">
                <div class="logo-box box-1"></div>
                <div class="logo-box box-2"></div>
                <div class="logo-box box-3"></div>
                <div class="logo-box box-4"></div>
            </div>
            <p>Starting Windows...</p>
        </div>
    </div>

    <!-- Desktop Gadgets -->
    <div class="gadgets">
        <div class="gadget clock-gadget">
            <div id="clock-time">00:00:00</div>
            <div id="clock-date">Month 00, Year</div>
        </div>
        <div class="gadget status-gadget">
            <div class="status-indicator"></div>
            <span id="personal-status">Currently: Online</span>
        </div>
        <div class="gadget spotify-gadget">
            <iframe src="https://open.spotify.com/embed/track/0UYnMDFZuXUpsiWGMq1EVk?utm_source=generator&theme=0" 
                width="100%" height="80" frameBorder="0" allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <div class="container fade-in">
        <div class="profile">
            <img src="./Icono_dav.webp" alt="Imagen de Dav con una gominola en la boca" class="logo">
            <h1 id="name">DavKiller</h1>
        </div>
        <div class="links">
            <a id="telegram" href="https://t.me/davkiller" class="link-button"><i class="fa-brands fa-telegram"></i>
                Telegram</a>
            <a id="telegram-art" href="https://t.me/DavKillerArt" class="link-button"><i class="fa-brands fa-telegram"></i>
                Telegram Art Chanel</a>
            <a id="twitter" href="https://twitter.com/davkiller5" class="link-button"><i class="fa-brands fa-twitter"></i>
                Twitter</a>
            <a id="bluesky" href="https://bsky.app/profile/davkiller.com" class="link-button"><i class="fa-brands fa-bluesky"></i>
                BlueSky</a>
            <a id="github" href="https://github.com/davkiller5" class="link-button"><i class="fa-brands fa-github"></i>
                Github</a>
            <a id="furaffinity" href="https://www.furaffinity.net/user/davkiller" class="link-button"><i class="fa-solid fa-paw"></i>
                FurAffinity</a>
            <a id="steam" href="https://steamcommunity.com/id/DavKiller/" class="link-button"><i class="fa-brands fa-steam"></i>
                Steam</a>
            <a id="barq" href="https://barq.app/@DavKiller" class="link-button"><i class="fa-solid fa-paw"></i>
                Barq</a>
            <a id="mail" href="mailto:admin@davkiller.com" class="link-button"><i class="fa-solid fa-envelope"></i>
                Mail</a>
            <button id="copy-url" class="link-button utility-button"><i class="fa-solid fa-share-nodes"></i>
                Copy Profile URL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
